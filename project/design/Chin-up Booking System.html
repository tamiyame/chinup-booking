<script type="text/babel">
const { useState, useEffect } = React;

// Tweak defaults — JSON block the host can rewrite
const DEFAULTS = /*EDITMODE-BEGIN*/{
  "primary": "#0ea5e9",
  "primaryDark": "#0284c7",
  "primaryLight": "#38bdf8",
  "primary50":  "#f0f9ff",
  "primary100": "#e0f2fe",
  "fontFamily": "default",
  "darkMode": false,
  "density": "default"
}/*EDITMODE-END*/;

// Apply tweaks to body + CSS variables
function applyTweaks(t) {
  const r = document.documentElement;
  r.style.setProperty('--brand-600', t.primary);
  r.style.setProperty('--brand-700', t.primaryDark);
  r.style.setProperty('--brand-500', t.primaryLight);
  r.style.setProperty('--brand-50',  t.primary50);
  r.style.setProperty('--brand-100', t.primary100);

  document.body.classList.toggle('dark-mode', !!t.darkMode);
  document.body.classList.toggle('font-serif-display', t.fontFamily === 'serif');
  document.body.classList.toggle('font-mono-num', t.fontFamily === 'mono');

  document.body.classList.toggle('density-tight', t.density === 'tight');
  document.body.classList.toggle('density-loose', t.density === 'loose');
}

function App() {
  const [tweaks, setTweak] = window.useTweaks
    ? window.useTweaks(DEFAULTS)
    : [DEFAULTS, () => {}];
  useEffect(() => { applyTweaks(tweaks); }, [tweaks]);

    <>
      <DesignCanvas zoomMin={0.18} zoomMax={1.5}>

            <div style={{padding: 28, background: '#fef4a8', height: '100%', fontSize: 14, lineHeight: 1.65, color: '#5a4a2a'}}>
              <div style={{fontSize: 16, fontWeight: 800, marginBottom: 12}}>設計策略</div>
              三個方案共用同一套 token + 元件庫，但資訊架構截然不同：
              <div style={{height: 12}}></div>
              <b>A · Classic List</b> — 列表優先，學生熟悉的閱讀方式。一對一用 GCal Appointment Schedule iframe 嵌入。
              <div style={{height: 8}}></div>
              <b>B · Calendar-First</b> — 週曆作為主要 UI。一對一用自建 calendar UI 串 Google Calendar API。
              <div style={{height: 8}}></div>
              <b>C · Editorial</b> — 雜誌排版＋大圖封面（位置已留圖框，可上傳實拍）。
            </div>
          </DCArtboard>
        </DCSection>

        {/* ====================== PLAN A ====================== */}
        <DCSection id="plan-a" title="方案 A · Classic List + GCal Embed"
                   subtitle="延續現有 UI kit。列表 → 詳情抽屜 → 教練卡 → 嵌入 GCal Appointment Schedule。">
          <DCArtboard id="a-desktop-home" label="A1 · 帶狀課程列表（桌面）" width={1200} height={900}>
            <PlanADesktop initialPage="home" />
          </DCArtboard>
          <DCArtboard id="a-desktop-mine" label="A2 · 我的課程（含進度／請假／轉讓）" width={1200} height={900}>
            <PlanADesktop initialPage="mine" />
          </DCArtboard>
          <DCArtboard id="a-desktop-coaches" label="A3 · 教練列表 + GCal 嵌入" width={1200} height={1000}>
            <PlanADesktop initialPage="coaches-detail" />
          </DCArtboard>
          <DCArtboard id="a-mobile-home" label="A4 · 行動版・首頁" width={390} height={844}>
            <IPhoneArtboard><PlanA /></IPhoneArtboard>
          </DCArtboard>
        </DCSection>

        {/* ====================== PLAN B ====================== */}

                   subtitle="週曆作為核心導航。1-on-1 用我們自己畫的時段挑選器，背後串 GCal API。">

            <StatusBadgeShowcase />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      {/* Tweaks panel */}
      <BookingTweaks tweaks={tweaks} setTweak={setTweak} />
    </>
  );
}

// ---- helpers / showcase artboards ----

function PlanADesktop({ initialPage }) {
  // Render PlanA but with default page set
  // simpler: render PlanA, and use a tiny wrapper to programmatically nav
  return (
    <div className="iphone-frame artboard-scroll" style={{height: '100%'}}>
      <PlanADesktopInner initialPage={initialPage} />
    </div>
  );
}

function PlanADesktopInner({ initialPage }) {
  // We'll re-implement minimally by re-using PlanA and seeding initial state
  return <PlanASeeded initialPage={initialPage} />;
}

function PlanASeeded({ initialPage }) {
  // Use the same inner state machine but seeded
  const [page, setPage] = React.useState(initialPage === 'mine' ? 'mine'
                                       : initialPage === 'coaches' ? 'coaches'
                                       : initialPage === 'coaches-detail' ? 'coaches'
                                       : 'home');
  const [openCourse, setOpenCourse] = React.useState(null);
  const [registered, setRegistered] = React.useState(window.DATA.MY_REGS);
  const [pickedCoach, setPickedCoach] = React.useState(initialPage === 'coaches-detail' ? 'c1' : null);
  const [booking, setBooking] = React.useState(null);

  const handleRegister = () => {
    if (!openCourse) return;
    setRegistered(prev => [...prev, {
      id: Date.now(), courseId: openCourse.id, period: 'p3',
      total: 8, attended: 0, upcoming: 8, leave: 0, transferable: 0,
    }]);
    setOpenCourse(null);
  };

  return (
    <div className="mobile-screen" style={{minHeight: '100%'}}>
      <PlanA_Nav active={page} onNav={(id) => {
        if (id === 'home') setPage('home');
        if (id === 'oneonone') { setPage('coaches'); setPickedCoach(null); setBooking(null); }
        if (id === 'mine') setPage('mine');
      }} />
      {page === 'home' && (
        <PlanA_Home onOpenCourse={setOpenCourse} registered={registered} />
      )}
      {page === 'mine' && (
        <PlanA_Mine registered={registered} />
      )}
      {page === 'coaches' && !pickedCoach && (
        <PlanA_Coaches onPickCoach={setPickedCoach} />
      )}
      {page === 'coaches' && pickedCoach && !booking && (
        <PlanA_CoachDetail coachId={pickedCoach}
                           onBack={() => setPickedCoach(null)}
                           onBook={setBooking} />
      )}
      {page === 'coaches' && booking && (
        <PlanA_BookingDone booking={booking} onDone={() => { setBooking(null); setPickedCoach(null); }} />
      )}
      <CourseDetailDrawer
        course={openCourse}
        onClose={() => setOpenCourse(null)}
        onRegister={handleRegister}
        registered={openCourse && registered.find(r => r.courseId === openCourse.id)}
      />
    </div>
  );
}

function PlanBDesktop({ initialPage }) {
  return (

      <PlanBSeeded initialPage={initialPage} />
    </div>

}

  const [page, setPage] = React.useState(initialPage === 'coach-detail' ? 'coaches' : 'cal');
  const [openCourse, setOpenCourse] = React.useState(null);

  return (

        onRegister={() => setOpenCourse(null)}
        onCancel={() => setOpenCourse(null)}
      />

}

function PlanBDesktopWithDrawer() {

}

function PlanCDesktop({ initialPage }) {
  return (
    <div className="iphone-frame artboard-scroll" style={{height: '100%'}}>

}

function PlanCSeeded({ initialPage }) {
  const [page, setPage] = React.useState(initialPage === 'coaches' ? 'coaches'
                                       : initialPage === 'coach-detail' ? 'coaches'
                                       : initialPage === 'booking-done' ? 'coaches'
                                       : 'home');
  const [openCourse, setOpenCourse] = React.useState(null);
  const [registered, setRegistered] = React.useState(window.DATA.MY_REGS);
  const [pickedCoach, setPickedCoach] = React.useState(
    initialPage === 'coach-detail' || initialPage === 'booking-done' ? 'c1' : null);
  const [booking, setBooking] = React.useState(
    initialPage === 'booking-done' ? { coachId: 'c1', date: '05/12', day: '週二', time: '14:00' } : null);

  return (
    <div className="mobile-screen" style={{minHeight: '100%', background: 'var(--canvas)'}}>
      <PlanC_Nav active={page === 'coaches' ? 'oneonone' : 'home'} onNav={(id) => {
        if (id === 'home') setPage('home');
        if (id === 'oneonone') { setPage('coaches'); setPickedCoach(null); setBooking(null); }
      }} />
      {page === 'home' && (
        <PlanC_Home onPickCourse={setOpenCourse} registered={registered} />
      )}
      {page === 'coaches' && !pickedCoach && (
        <PlanC_Coaches onPickCoach={setPickedCoach} />
      )}
      {page === 'coaches' && pickedCoach && !booking && (
        <PlanC_CoachDetail coachId={pickedCoach}
                           onBack={() => setPickedCoach(null)}
                           onBook={setBooking} />
      )}
      {page === 'coaches' && booking && (
        <PlanC_BookingDone booking={booking} onDone={() => { setBooking(null); setPickedCoach(null); }} />
      )}
      <PlanC_CourseModal
        course={openCourse}
        registered={registered}
        onClose={() => setOpenCourse(null)}
        onRegister={() => setOpenCourse(null)}
        onCancel={() => setOpenCourse(null)}
      />
    </div>
  );
}

// ---- Tweaks Panel ----

function BookingTweaks({ tweaks, setTweak }) {
  const TweaksPanel = window.TweaksPanel;
  const TweakSection = window.TweakSection;
  const TweakColor = window.TweakColor;
  const TweakRadio = window.TweakRadio;
  const TweakToggle = window.TweakToggle;
  const TweakSelect = window.TweakSelect;

  if (!TweaksPanel) return null;

  // 4 curated palettes (each is { primary, primaryDark, primaryLight, primary50, primary100 })
  const palettes = [
    { name: 'Sky (預設)',  vals: { primary:'#0ea5e9', primaryDark:'#0284c7', primaryLight:'#38bdf8', primary50:'#f0f9ff', primary100:'#e0f2fe' } },
    { name: 'Charcoal', vals: { primary:'#0f172a', primaryDark:'#000000', primaryLight:'#475569', primary50:'#f1f5f9', primary100:'#e2e8f0' } },
    { name: 'Forest',  vals: { primary:'#047857', primaryDark:'#065f46', primaryLight:'#10b981', primary50:'#ecfdf5', primary100:'#d1fae5' } },
    { name: 'Crimson', vals: { primary:'#b91c1c', primaryDark:'#7f1d1d', primaryLight:'#ef4444', primary50:'#fef2f2', primary100:'#fee2e2' } },
  ];

  const activeIdx = palettes.findIndex(p => p.vals.primary === tweaks.primary);

  return (
    <TweaksPanel title="Tweaks">
      <TweakSection title="主色 / 配色">
        <div style={{display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 8}}>
          {palettes.map((p, i) => (
            <button key={p.name}
                    onClick={() => setTweak(p.vals)}
                    style={{
                      padding: 10,
                      border: `1.5px solid ${activeIdx === i ? '#0f172a' : '#e5e7eb'}`,
                      background: activeIdx === i ? '#f8faf9' : '#fff',
                      borderRadius: 10,
                      cursor: 'pointer',
                      textAlign: 'left',
                    }}>
              <div style={{display: 'flex', gap: 4, marginBottom: 6}}>
                <div style={{width: 24, height: 24, borderRadius: 6, background: p.vals.primary}}></div>
                <div style={{width: 14, height: 24, borderRadius: 4, background: p.vals.primaryDark}}></div>
                <div style={{width: 14, height: 24, borderRadius: 4, background: p.vals.primaryLight}}></div>
                <div style={{width: 14, height: 24, borderRadius: 4, background: p.vals.primary50, border: '1px solid #e5e7eb'}}></div>
              </div>
              <div style={{fontSize: 11, fontWeight: 600}}>{p.name}</div>
            </button>
          ))}
        </div>
      </TweakSection>

      <TweakSection title="字體組合">
        <TweakRadio
          value={tweaks.fontFamily}
          onChange={(v) => setTweak('fontFamily', v)}
          options={[
            { value: 'default', label: 'Inter + LiHei' },
            { value: 'serif',   label: '標題襯線' },
            { value: 'mono',    label: '數字等寬' },
          ]} />
      </TweakSection>

      <TweakSection title="主題">
        <TweakToggle
          label="深色模式"
          checked={tweaks.darkMode}
          onChange={(v) => setTweak('darkMode', v)} />
      </TweakSection>

      <TweakSection title="排版密度">
        <TweakRadio
          value={tweaks.density}
          onChange={(v) => setTweak('density', v)}
          options={[
            { value: 'tight',   label: '緊湊' },
            { value: 'default', label: '預設' },
            { value: 'loose',   label: '寬鬆' },
          ]} />
      </TweakSection>
    </TweaksPanel>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
