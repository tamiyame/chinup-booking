<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Empty state</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { font-family: var(--font-sans); background: #f8faf9; }
  .empty {
    flex: 1;
    padding: 32px 24px; text-align: center;
    color: #475569;
    border: 1px dashed #e5e7eb; border-radius: 14px;
    background: #ffffff;
  }
  .icon { font-size: 36px; opacity: 0.4; margin-bottom: 8px; display: block; }
  .subtle { color: #94a3b8; font-size: 13px; margin-top: 4px; }
</style>
</head>
<body>
<div class="card center" style="padding:18px 20px;">
  <div class="empty">
    <span class="icon">🗓️</span>
    <p style="margin:0;">目前沒有可報名的課程</p>
    <p class="subtle">請稍後再查看，或聯絡管理員新增課程</p>
  </div>
</div>
</body>
</html>
