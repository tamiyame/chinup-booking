<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type scale</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { font-family: var(--font-sans); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 4px 0; }
  .sample { color: var(--fg-1); letter-spacing: -0.01em; flex: 1; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); white-space: nowrap; letter-spacing: 0.02em; }
  .h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.03em; }
  .h2 { font-size: 20px; font-weight: 700; }
  .h3 { font-size: 17px; font-weight: 700; }
  .body { font-size: 14px; font-weight: 400; }
  .small { font-size: 13px; font-weight: 400; color: var(--fg-2); }
  .xs { font-size: 12px; font-weight: 400; color: var(--fg-3); }
</style>
</head>
<body>
<div class="card column" style="gap:2px;justify-content:center;">
  <div class="row"><div class="sample h1">課程管理後台</div><div class="meta">H1 · 28/800 · LiHei Pro</div></div>
  <div class="row"><div class="sample h2">可報名課程</div><div class="meta">H2 · 20/700</div></div>
  <div class="row"><div class="sample h3">重量訓練</div><div class="meta">H3 · 17/700</div></div>
  <div class="row"><div class="sample body">由專業教練設計的循環課表</div><div class="meta">Body · 14/400</div></div>
  <div class="row"><div class="sample small">下次 11/05 週三 19:00</div><div class="meta">Small · 13/400</div></div>
  <div class="row"><div class="sample xs">報名截止：2026/05/04 19:00</div><div class="meta">XS · 12/400</div></div>
</div>
</body>
</html>
