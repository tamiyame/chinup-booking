<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Radii</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { font-family: var(--font-sans); }
  .row { display: flex; gap: 16px; align-items: center; justify-content: space-around; width: 100%; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { width: 72px; height: 72px; background: #e0f2fe; border: 1px solid #bae6fd; }
  .name { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #475569; }
  .val { font-family: var(--font-mono); font-size: 11px; color: #94a3b8; }
  .pill { width: 96px; height: 36px; border-radius: 9999px; background: #e0f2fe; border: 1px solid #bae6fd; }
</style>
</head>
<body>
<div class="card center">
  <div class="row">
    <div class="item"><div class="box" style="border-radius: 10px;"></div><span class="name">Sm</span><span class="val">10px</span></div>
    <div class="item"><div class="box" style="border-radius: 14px;"></div><span class="name">Default</span><span class="val">14px</span></div>
    <div class="item"><div class="box" style="border-radius: 20px;"></div><span class="name">Lg</span><span class="val">20px</span></div>
    <div class="item"><div class="pill"></div><span class="name">Pill</span><span class="val">9999px</span></div>
  </div>
</div>
</body>
</html>
